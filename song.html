<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歌曲详情</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="song-hero">
        <div>
          <a class="song-back" href="./index.html">← 返回作品总览</a>
          <p class="eyebrow">Track intelligence</p>
          <h1 id="songTitle">歌曲详情</h1>
          <p id="songSubtitle" class="subtitle">查看这首歌的收入表现与分布情况。</p>
        </div>
        <div class="song-load-state">
          <p id="songStatus" class="status">正在加载歌曲数据…</p>
        </div>
      </header>

      <section class="song-kpi-grid" id="songSummaryGrid"></section>

      <section class="song-year-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Year by year</p>
            <h2>年度表现</h2>
            <p class="section-copy">比较每一年的收入、播放量与月均表现。</p>
          </div>
        </div>
        <div class="song-year-grid" id="songYearGrid"></div>
      </section>

      <section class="song-detail-section">
        <article class="card chart-card song-trend-card">
          <div class="card-header">
            <p class="eyebrow">Monthly revenue</p>
            <h2>收入生命周期</h2>
            <p>观察作品上线后的收入节奏与持续性</p>
          </div>
          <div id="songTrendChart" class="song-trend-chart"></div>
        </article>

        <div class="song-distribution-grid">
          <article class="card chart-card song-list-card">
            <div class="card-header">
              <h2>平台分布</h2>
              <p>收入来自哪些渠道</p>
            </div>
            <div id="songPlatformChart" class="platform-list"></div>
          </article>

          <article class="card chart-card song-list-card song-list-card--plays">
            <div class="card-header">
              <h2>播放渠道</h2>
              <p>播放量来自哪些平台</p>
            </div>
            <div id="songPlayPlatformChart" class="platform-list"></div>
          </article>

        </div>
      </section>
    </div>

    <script src="./song.js"></script>
  </body>
</html>
